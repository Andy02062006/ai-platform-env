# openenv.yaml
# Metadata descriptor for AIPlatformEnv following the OpenEnv specification.
# This file is consumed by OpenEnv tooling for registration, discovery,
# and automated evaluation harness generation.

# ── Identity ───────────────────────────────────────────────────────────────
name: AIPlatformEnv
version: "0.1.0"
description: >
  A premium OpenEnv benchmark simulating AI platform interactions. Features 
  "Sequence Reward Shaping" for logical reasoning sequences and an 
  "Interactive Lab" (Gradio UI) for human evaluation. Supports three
  difficulties: factual Q&A, summarization, and code optimization.

# ── Author ─────────────────────────────────────────────────────────────────
author:
  name: Your Name
  email: your-email@example.com
  organisation: Your Organisation   # optional

# ── Repository & licensing ─────────────────────────────────────────────────
repository: https://github.com/Andy02062006/ai-platform-env
license: MIT

# ── Python runtime ─────────────────────────────────────────────────────────
python_requires: ">=3.10"
dependencies:
  - pydantic>=2.0
  - requests>=2.31
  - python-dotenv>=1.0
  # - openenv   # uncomment once published on PyPI

# ── Entry points ───────────────────────────────────────────────────────────
entry_points:
  env_class: server.env.AIPlatformEnv      # import path for the environment class
  baseline:  inference.main          # entry point using the compliant inference script

# ── Interface models ───────────────────────────────────────────────────────
# References to the Pydantic models that define the agent–env contract.
models:
  action:
    module: server.models
    class: Action
    fields:
      type:
        dtype: string
        values: [submit_query, select_response, rate_response, refine_query, plan_task, compare_responses, summarize]
        description: The kind of action to perform.
      query:
        dtype: string
        optional: true
        description: Query string; required when type=submit_query.
      selected_index:
        dtype: integer
        optional: true
        constraints: {ge: 0}
        description: Zero-based index of chosen response; required when type=select_response.
      score:
        dtype: float
        optional: true
        constraints: {ge: 0.0, le: 1.0}
        description: Quality rating in [0,1]; required when type=rate_response.
      plan:
        dtype: string
        optional: true
        description: Plan description; required when type=plan_task.

  observation:
    module: server.models
    class: Observation
    fields:
      responses:
        dtype: list[Response]
        description: Candidate responses returned by the AI platform.
      history:
        dtype: list[string]
        description: Chronological list of all queries submitted this episode.

  response:
    module: server.models
    class: Response
    fields:
      text:
        dtype: string
        description: Full text of the platform response.
      relevance:
        dtype: float
        constraints: {ge: 0.0, le: 1.0}
        description: How relevant the response is to the query.
      confidence:
        dtype: float
        constraints: {ge: 0.0, le: 1.0}
        description: Platform's self-reported confidence in the response.

  reward:
    module: server.models
    class: Reward
    fields:
      value:
        dtype: float
        description: Scalar reward signal for the most recent action.

# ── Tasks ──────────────────────────────────────────────────────────────────
tasks:

  easy:
    key: factual_qa_evaluation
    difficulty: easy
    description: >
      AI Quality Evaluation: Factual Q&A. The agent submits queries to evaluate
      the precision and relevance of candidate responses for geography-based
      factual queries.
    max_turns: 5
    score_range: {random: 0.10, baseline: 0.85, optimal: 0.95}
    grader:
      module: server.tasks
      function: grade_easy
    target_keywords: [france, capital, paris, city, location]

  medium:
    key: multi_document_summarization
    difficulty: medium
    description: >
      AI Research: Multi-perspective Summarization. The agent refines queries
      to compile a comprehensive summary of complex historical events, balancing
      multiple viewpoints and detail levels.
    max_turns: 8
    score_range: {random: 0.08, baseline: 0.75, optimal: 0.95}
    grader:
      module: server.tasks
      function: grade_medium
    target_keywords: [summary, causes, consequences, perspective, historical]

  hard:
    key: code_review_and_optimization
    difficulty: hard
    description: >
      AI Software Engineering: Code Review and Optimization. The agent iterates
      on algorithmic queries to produce optimized, idiomatic Python code,
      simulating a developer-assistant pair programming workflow.
    max_turns: 12
    score_range: {random: 0.05, baseline: 0.65, optimal: 0.95}
    grader:
      module: server.tasks
      function: grade_hard
    target_keywords: [algorithm, complexity, optimization, python, performance]

# ── Evaluation protocol ────────────────────────────────────────────────────
evaluation:
  seed: 42                        # RNG seed for reproducibility
  episodes_per_task: 1            # number of episodes used to compute a score
  aggregation: mean               # how task scores are combined (mean | min | weighted)
  score_range: [0.0, 1.0]
  deterministic: true             # same seed always produces the same scores

# ── Docker ─────────────────────────────────────────────────────────────────
docker:
  image: aiplatformenv:0.1.0
  build_context: .
  dockerfile: Dockerfile
  default_command: ["uvicorn", "server.app:app", "--host", "0.0.0.0", "--port", "7860"]